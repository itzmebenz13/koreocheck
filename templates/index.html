<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>SHEIN Price Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --bg:#f5f5f5;--surface:#fff;--surface-hover:#fafafa;
  --border:#eeeeee;--border-dark:#dddddd;
  --text-main:#222;--text-muted:#767676;--text-light:#aaa;
  --brand-black:#222;--brand-price:#fa6338;--brand-success:#03a65a;--brand-warn:#f5a623;
  --r-sm:4px;--r-md:8px;--r-lg:12px;--r-pill:99px;
  --shadow-sm:0 2px 8px rgba(0,0,0,.05);--shadow-lg:0 8px 24px rgba(0,0,0,.1);
}
[data-theme="dark"]{
  --bg:#0a0a0a;--surface:#111;--surface-hover:#1a1a1a;
  --border:#2a2a2a;--border-dark:#3a3a3a;
  --text-main:#f0f0f0;--text-muted:#888;--text-light:#555;
  --brand-black:#f0f0f0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text-main);line-height:1.5;padding-bottom:110px}
.app{max-width:500px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}

/* ── Header ── */
.app-header{position:sticky;top:0;z-index:50;background:var(--surface);display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.app-title{font-size:16px;font-weight:800;letter-spacing:-.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.app-subtitle{font-size:11px;color:var(--text-muted);font-weight:500;margin-top:1px}
.icon-btn{background:transparent;border:none;color:var(--text-main);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.icon-btn:active{background:var(--border)}
.cart-badge{position:absolute;top:-2px;right:-2px;background:var(--brand-price);color:#fff;width:16px;height:16px;border-radius:50%;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;display:none}

/* ── Sections ── */
.section{background:var(--surface);margin-bottom:10px;padding:16px}
.section-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.section-title-sm{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}

/* ── Search ── */
.search-box{display:flex;align-items:stretch;background:var(--bg);border-radius:var(--r-md);border:1px solid var(--border);overflow:hidden;transition:border-color .2s}
.search-box:focus-within{border-color:var(--brand-black)}
.country-select{background:transparent;border:none;border-right:1px solid var(--border);padding:0 12px;color:var(--text-main);font-weight:700;font-size:13px;outline:none;cursor:pointer;min-width:52px}
.search-input{flex:1;background:transparent;border:none;padding:12px 14px;color:var(--text-main);font-size:14px;outline:none;width:100%}
.search-input::placeholder{color:var(--text-light)}
.btn{border:none;border-radius:var(--r-sm);padding:12px 18px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .1s,opacity .2s,background .2s;user-select:none;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.55;pointer-events:none}
.btn-black{background:var(--brand-black);color:var(--bg)}
.btn-outline{background:transparent;border:1px solid var(--border-dark);color:var(--text-main)}
.btn-full{width:100%;margin-top:12px}
.btn-sm{padding:8px 14px;font-size:13px}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 7px;border-radius:var(--r-sm);letter-spacing:.2px}
.badge-sale{background:rgba(250,99,56,.1);color:var(--brand-price)}
.badge-green{background:rgba(3,166,90,.1);color:var(--brand-success)}
.badge-gray{background:var(--bg);color:var(--text-muted)}
.badge-black{background:var(--brand-black);color:var(--bg)}

/* ── Variant Picker ── */
.preview-card{margin-top:16px;border-top:1px solid var(--border);padding-top:16px;animation:slideUp .25s ease}
.price-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.price-main{font-size:24px;font-weight:800;color:var(--text-main)}
.goods-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-light);margin-left:auto;align-self:center}
.vp-group{margin-bottom:14px}
.vp-label{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.vp-label span{font-weight:500;color:var(--brand-price);font-size:13px}
.swatches{display:flex;flex-wrap:wrap;gap:8px}
.swatch-color{width:30px;height:30px;border-radius:50%;border:2px solid var(--border-dark);cursor:pointer;transition:.15s;position:relative;flex-shrink:0}
.swatch-color.selected{outline:2.5px solid var(--brand-black);outline-offset:2px}
.swatch-color.selected::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.swatch-size{border:1px solid var(--border);background:var(--bg);padding:7px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;user-select:none}
.swatch-size:hover:not(.disabled){border-color:var(--text-muted)}
.swatch-size.selected{background:var(--brand-black);color:var(--surface);border-color:var(--brand-black);font-weight:700}
.swatch-size.disabled{opacity:.35;text-decoration:line-through;cursor:not-allowed;pointer-events:none}
.stock-note{font-size:11px;margin-top:10px;display:flex;align-items:center;gap:5px}
.stock-warn{color:var(--brand-price)}
.stock-ok{color:var(--brand-success)}

/* ── Cart ── */
.cart-empty{text-align:center;padding:36px 0;color:var(--text-light)}
.cart-empty p{font-size:13px;margin-top:10px}
.cart-list{display:flex;flex-direction:column}
.cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.item-img{width:76px;height:100px;background:var(--bg);border-radius:var(--r-sm);object-fit:cover;flex-shrink:0}
.item-details{flex:1;min-width:0;display:flex;flex-direction:column}
.item-name{font-size:13px;line-height:1.4;color:var(--text-main);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.item-attrs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.item-attr{font-size:10px;color:var(--text-muted);background:var(--bg);border:1px solid var(--border);padding:2px 6px;border-radius:var(--r-sm)}
.item-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.item-price{font-size:15px;font-weight:800;color:var(--text-main)}
.qty-pill{display:flex;align-items:center;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-pill);padding:2px}
.qty-btn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--text-main);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;font-size:14px}
.qty-btn:hover{background:var(--border)}
.qty-btn:active{background:var(--border-dark)}
.qty-val{font-size:13px;font-weight:700;min-width:24px;text-align:center}
.cart-item-remove{background:none;border:none;color:var(--text-light);cursor:pointer;padding:4px;align-self:flex-start;margin-left:-4px;border-radius:4px;transition:.15s}
.cart-item-remove:hover{color:var(--brand-price)}

/* ── Sticky Bottom Bar ── */
.sticky-bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:500px;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 20px rgba(0,0,0,.07);z-index:100;transition:transform .3s cubic-bezier(.16,1,.3,1)}
.sticky-bottom.visible{transform:translateX(-50%) translateY(0)}
.total-col{display:flex;flex-direction:column}
.total-lbl{font-size:10px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.total-val{font-size:21px;font-weight:800;color:var(--text-main)}
.checkout-btn{background:var(--brand-black);color:var(--bg);border:none;border-radius:var(--r-pill);padding:14px 28px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;transition:opacity .2s}
.checkout-btn:disabled{opacity:.6;pointer-events:none}
.checkout-btn:active{opacity:.8}

/* ── Results ── */
#results{display:none;animation:fadeIn .35s ease}
.summary-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted);margin-bottom:10px;align-items:center}
.summary-row .val{color:var(--text-main);font-weight:500}
.summary-row.bold{font-size:15px;font-weight:800;color:var(--text-main);border-top:1px solid var(--border);padding-top:12px;margin-top:4px;margin-bottom:0}
.summary-row.bold .val{color:var(--brand-price);font-size:18px}
.val-free{color:var(--brand-success)!important;font-weight:700!important}
.ship-note{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:5px;margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:var(--r-sm)}

/* ── Coupon Cards ── */
.coupon-card{border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px;position:relative;background:var(--surface);overflow:hidden}
.coupon-card.best{border-color:var(--brand-success)}
.coupon-card.best::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand-success)}
.coupon-card.ineligible{opacity:.55;background:var(--bg)}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.cc-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cc-desc{font-size:11px;color:var(--text-muted);margin-top:3px}
.cc-price-box{background:var(--bg);padding:10px 12px;border-radius:var(--r-sm);display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.cc-old{font-size:12px;color:var(--text-muted);text-decoration:line-through}
.cc-new{font-size:19px;font-weight:800;color:var(--brand-success)}
.cc-save{margin-left:auto;background:var(--brand-black);color:var(--surface);font-size:11px;font-weight:700;padding:4px 8px;border-radius:var(--r-sm);white-space:nowrap}
.cc-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px dashed var(--border);padding-top:10px;margin-top:2px;flex-wrap:wrap;gap:8px}
.cc-code{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--border-dark);padding:4px 10px;border-radius:4px;cursor:pointer;transition:.15s;user-select:none}
.cc-code:active{background:var(--border)}
.cc-inelig{font-size:11px;color:var(--brand-price);display:flex;align-items:center;gap:4px}
.cc-ship{font-size:12px;color:var(--brand-success);display:flex;align-items:center;gap:5px;font-weight:600}

/* ── Voucher Selection ── */
.voucher-selector{display:flex;flex-direction:column;gap:10px}
.coupon-card.selectable{cursor:pointer;transition:border-color .2s,box-shadow .2s}
.coupon-card.selectable:hover:not(.ineligible){border-color:var(--brand-black);box-shadow:var(--shadow-sm)}
.coupon-card.active-voucher{border-color:var(--brand-black)!important;box-shadow:0 0 0 2px var(--brand-black)!important}
.coupon-card.active-voucher .cc-check{display:flex!important}
.cc-check{display:none;width:20px;height:20px;border-radius:50%;background:var(--brand-black);align-items:center;justify-content:center;flex-shrink:0}
.no-voucher-opt{border:1px dashed var(--border-dark);border-radius:var(--r-md);padding:12px 16px;font-size:13px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:8px;transition:.2s}
.no-voucher-opt:hover{border-color:var(--brand-black);color:var(--text-main)}
.no-voucher-opt.active-voucher{border-color:var(--brand-black);color:var(--text-main);font-weight:600}
/* ── Points Toggle ── */
.points-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg);border-radius:var(--r-md);border:1px solid var(--border);margin-bottom:14px}
.points-info{display:flex;flex-direction:column;gap:2px}
.points-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.points-sub{font-size:11px;color:var(--text-muted)}
.toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--border-dark);border-radius:24px;cursor:pointer;transition:.2s}
.toggle-track::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked + .toggle-track{background:var(--brand-black)}
input:checked + .toggle-track::before{transform:translateX(20px)}
/* ── Live Total Bar ── */
.live-total{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.lt-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:4px}
.lt-price{font-size:28px;font-weight:800;color:var(--brand-price);letter-spacing:-.5px}
.lt-breakdown{font-size:12px;color:var(--text-muted);margin-top:6px;display:flex;flex-direction:column;gap:3px}
.lt-row{display:flex;justify-content:space-between}
.lt-row.saving{color:var(--brand-success);font-weight:600}
/* ── Cleanup Notice ── */
.cleanup-notice{background:rgba(245,166,35,.07);border:1px solid rgba(245,166,35,.3);border-radius:var(--r-md);padding:10px 12px;font-size:11px;color:var(--brand-warn);display:flex;align-items:flex-start;gap:7px;margin-bottom:12px}
/* ── Result Items ── */
.result-items{display:flex;flex-direction:column;gap:10px}
.ri-row{display:flex;align-items:center;gap:10px}
.ri-img{width:48px;height:64px;border-radius:var(--r-sm);object-fit:cover;background:var(--bg);flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:12px;color:var(--text-main);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.ri-attr{font-size:11px;color:var(--text-muted);margin-top:2px}
.ri-price{font-size:14px;font-weight:800;color:var(--text-main);flex-shrink:0}

/* ── Loading states ── */
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--surface-hover) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r-sm)}

/* ── Toast ── */
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--brand-black);color:var(--surface);padding:11px 20px;border-radius:var(--r-pill);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;opacity:0;pointer-events:none;transition:all .28s cubic-bezier(.16,1,.3,1);z-index:1000;box-shadow:var(--shadow-lg);white-space:nowrap;max-width:90vw}
#toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:0}

/* ── Animations ── */
.spin{animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <header class="app-header">
    <div>
      <div class="app-title">Price Checker <i data-lucide="sparkles" style="width:16px;height:16px;color:var(--brand-price)"></i></div>
      <div class="app-subtitle">Smart cart &amp; voucher analysis</div>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="icon-btn" id="theme-btn"><i data-lucide="moon"></i></button>
    </div>
  </header>

  <!-- Add to Cart Section -->
  <section class="section">
    <div class="section-title">Add to Cart</div>
    <div class="search-box">
      <select class="country-select" id="country-sel">
        <option value="PH">PH</option>
        <option value="TH">TH</option>
        <option value="MY">MY</option>
        <option value="SG">SG</option>
      </select>
      <input class="search-input" id="item-query" type="text" placeholder="Paste URL or product ID..." autocomplete="off">
    </div>
    <button class="btn btn-black btn-full" id="lookup-btn">
      <i data-lucide="search" style="width:15px;height:15px"></i> Search Product
    </button>
    <div id="item-preview" style="display:none"></div>
  </section>

  <!-- Cart Section -->
  <section class="section" id="cart-section">
    <div class="section-title">
      <span>Shopping Bag <span id="cart-count-text" style="color:var(--text-muted);font-weight:500"></span></span>
      <button id="clear-cart-btn" style="background:none;border:none;color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;padding:4px 0">Clear all</button>
    </div>
    <div class="cart-list" id="cart-list">
      <div class="cart-empty" id="cart-empty">
        <i data-lucide="shopping-bag" style="width:44px;height:44px;stroke-width:1.2;opacity:.3"></i>
        <p>Your bag is empty.<br><span style="color:var(--text-light)">Search for a product above.</span></p>
      </div>
    </div>
  </section>

  <!-- Results -->
  <div id="results"></div>

  <!-- Sticky Bottom Bar -->
  <div class="sticky-bottom" id="sticky-bottom">
    <div class="total-col">
      <span class="total-lbl">Subtotal</span>
      <span class="total-val" id="sticky-total">₱0.00</span>
    </div>
    <button class="checkout-btn" id="checkout-btn">
      Calculate Price <i data-lucide="arrow-right" style="width:16px;height:16px"></i>
    </button>
  </div>
</div>

<!-- Toast -->
<div id="toast"><i data-lucide="check-circle-2" id="toast-icon" style="width:16px;height:16px;flex-shrink:0"></i><span id="toast-msg"></span></div>

<script>
lucide.createIcons();

// ── Utils ──────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
let _tt;
function toast(msg, err=false){
  $('toast-msg').textContent = msg;
  $('toast').style.background = err ? 'var(--brand-price)' : 'var(--brand-black)';
  $('toast').classList.add('on');
  clearTimeout(_tt); _tt = setTimeout(() => $('toast').classList.remove('on'), 2500);
}
function esc(s){ return String(s===undefined?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Theme ──────────────────────────────────────────────────────
$('theme-btn').addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  $('theme-btn').innerHTML = `<i data-lucide="${isDark ? 'moon' : 'sun'}"></i>`;
  lucide.createIcons();
});

// ── Cart State ─────────────────────────────────────────────────
let cart = [];

function updateStickyBar(){
  const bar = $('sticky-bottom');
  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
  const sym = cart.length ? (cart[0].symbol || '₱') : '₱';
  $('sticky-total').textContent = `${sym}${total.toFixed(2)}`;
  const hasItems = cart.length > 0;
  bar.classList.toggle('visible', hasItems);
  $('results').style.display = 'none'; // reset results when cart changes
}

function renderCart(){
  const list = $('cart-list');
  const cnt  = cart.reduce((s,i) => s + i.qty, 0);
  $('cart-count-text').textContent = cnt > 0 ? `(${cnt})` : '';

  if(cart.length === 0){
    list.innerHTML = `
      <div class="cart-empty" id="cart-empty">
        <i data-lucide="shopping-bag" style="width:44px;height:44px;stroke-width:1.2;opacity:.3"></i>
        <p>Your bag is empty.<br><span style="color:var(--text-light)">Search for a product above.</span></p>
      </div>`;
  } else {
    list.innerHTML = cart.map((item, idx) => `
      <div class="cart-item">
        <img class="item-img" src="${esc(item.image)}" onerror="this.style.background='var(--border)';this.src=''" alt="">
        <div class="item-details">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div class="item-name">${esc(item.name)}</div>
            <button class="cart-item-remove" data-idx="${idx}">
              <i data-lucide="x" style="width:14px;height:14px"></i>
            </button>
          </div>
          <div class="item-attrs">
            ${item.color ? `<span class="item-attr">${esc(item.color)}</span>` : ''}
            ${item.size  ? `<span class="item-attr">${esc(item.size)}</span>` : ''}
            <span class="item-attr" style="font-family:'JetBrains Mono',monospace">#${esc(item.goods_id)}</span>
          </div>
          <div class="item-bottom">
            <div class="item-price">${esc(item.symbol||'₱')}${(item.price * item.qty).toFixed(2)}</div>
            <div class="qty-pill">
              <button class="qty-btn" data-idx="${idx}" data-delta="-1">
                <i data-lucide="${item.qty === 1 ? 'trash-2' : 'minus'}" style="width:13px;height:13px"></i>
              </button>
              <div class="qty-val">${item.qty}</div>
              <button class="qty-btn" data-idx="${idx}" data-delta="1">
                <i data-lucide="plus" style="width:13px;height:13px"></i>
              </button>
            </div>
          </div>
        </div>
      </div>`).join('');

    list.querySelectorAll('.qty-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx   = parseInt(btn.dataset.idx);
        const delta = parseInt(btn.dataset.delta);
        if(cart[idx].qty + delta <= 0) cart.splice(idx, 1);
        else cart[idx].qty += delta;
        renderCart(); updateStickyBar();
      });
    });
    list.querySelectorAll('.cart-item-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        cart.splice(parseInt(btn.dataset.idx), 1);
        renderCart(); updateStickyBar();
      });
    });
  }
  lucide.createIcons();
  updateStickyBar();
}

function addToCart(item){
  const idx = cart.findIndex(c => c.goods_id === item.goods_id && c.sku_code === item.sku_code);
  if(idx >= 0){ cart[idx].qty++; toast('Quantity updated ✓'); }
  else { cart.push({...item, qty:1}); toast('Added to bag ✓'); }
  renderCart();
}

$('clear-cart-btn').addEventListener('click', () => {
  if(cart.length === 0) return;
  cart = []; renderCart();
  toast('Bag cleared');
});

// ── Lookup + Variant Picker ────────────────────────────────────
let _lookupData = null;
let _selColor   = null;
let _selSize    = null;

$('lookup-btn').addEventListener('click', doLookup);
$('item-query').addEventListener('keydown', e => { if(e.key === 'Enter') doLookup(); });
$('country-sel').addEventListener('change', () => {
  $('item-preview').style.display = 'none';
  _lookupData = null; _selColor = null; _selSize = null;
});

async function doLookup(){
  const query   = $('item-query').value.trim();
  const country = $('country-sel').value;
  if(!query){ toast('Enter a product URL or ID', true); return; }

  const btn = $('lookup-btn');
  btn.disabled = true;
  btn.innerHTML = `<i data-lucide="loader-2" class="spin" style="width:15px;height:15px"></i> Searching...`;
  lucide.createIcons();

  $('item-preview').style.display = 'none';
  _lookupData = null; _selColor = null; _selSize = null;

  try{
    const resp = await fetch('/api/item-info', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({query, country})
    });
    const data = await resp.json();
    if(!resp.ok || data.error) throw new Error(data.error || 'Lookup failed');
    _lookupData = data;
    if(data.unique_colors.length === 1) _selColor = data.unique_colors[0].name;
    if(data.unique_sizes.length  === 1) _selSize  = data.unique_sizes[0];
    renderPicker();
    $('item-query').value = '';
  } catch(e){
    toast(e.message, true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<i data-lucide="search" style="width:15px;height:15px"></i> Search Product`;
    lucide.createIcons();
  }
}

function getSizesForColor(data, color){
  return data.variants.filter(v => !data.has_colors || !color || v.color === color)
    .map(v => ({size: v.size, in_stock: v.in_stock, stock: v.stock}));
}

function findSku(data, color, size){
  return data.variants.find(v => {
    const cm = !data.has_colors || !v.color || !color || v.color === color;
    const sm = !data.has_sizes  || !v.size  || !size  || v.size  === size;
    return cm && sm;
  });
}

function getCurrentPrice(){
  if(!_lookupData) return {price: _lookupData?.sale_price||0, display: _lookupData?.sale_display||''};
  const sku = findSku(_lookupData, _selColor, _selSize);
  if(sku && sku.price) return {price: sku.price, display: sku.price_display || `${_lookupData.symbol||'₱'}${sku.price.toFixed(2)}`};
  return {price: _lookupData.sale_price, display: _lookupData.sale_display};
}

function renderPicker(){
  const data = _lookupData;
  if(!data) return;
  const prev = $('item-preview');
  const sym  = data.symbol || '₱';
  const {price: curPrice, display: curDisplay} = getCurrentPrice();

  // Product image + name header
  const hasImage = data.image && data.image.length > 0;
  const productHeader = `
    <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:14px">
      ${hasImage
        ? `<img src="${esc(data.image)}" style="width:72px;height:96px;object-fit:cover;border-radius:var(--r-sm);flex-shrink:0;background:var(--border)" onerror="this.style.display='none'">`
        : `<div style="width:72px;height:96px;border-radius:var(--r-sm);background:var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center"><i data-lucide="image" style="width:24px;height:24px;opacity:.3"></i></div>`}
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;line-height:1.4;color:var(--text-main);margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical">${esc(data.name)}</div>
        <div style="font-size:10px;color:var(--text-light);font-family:'JetBrains Mono',monospace">#${esc(data.goods_id)}</div>
      </div>
    </div>`;

  // Tags
  const tags = [];
  if(data.is_on_sale)    tags.push(`<span class="badge badge-sale">Sale</span>`);
  if(data.free_shipping) tags.push(`<span class="badge badge-green">Free Shipping</span>`);
  if(data.coupons && data.coupons.length > 0)
    tags.push(`<span class="badge badge-black">${data.coupons.length} Voucher${data.coupons.length>1?'s':''}</span>`);

  const infoRow = `
    <div class="price-row" id="picker-price-row">
      <span class="price-main" id="picker-price">${esc(curDisplay)}</span>
      ${tags.join('')}
    </div>`;

  // Color picker
  let colorSection = '';
  if(data.has_colors && data.unique_colors.length > 0){
    const btns = data.unique_colors.map(c => {
      const sel = _selColor === c.name ? 'selected' : '';
      const bg  = c.img ? `background:${esc(c.img)}` : 'background:var(--border-dark)';
      return `<div class="swatch-color ${sel}" style="${bg}" data-color="${esc(c.name)}" title="${esc(c.name)}"></div>`;
    }).join('');
    colorSection = `
      <div class="vp-group">
        <div class="vp-label">Color <span>${_selColor ? esc(_selColor) : 'Select'}</span></div>
        <div class="swatches" id="color-swatches">${btns}</div>
      </div>`;
  }

  // Size picker
  let sizeSection = '';
  if(data.has_sizes && data.unique_sizes.length > 0){
    const availSizes = getSizesForColor(data, _selColor);
    const btns = data.unique_sizes.map(sz => {
      const info = availSizes.find(s => s.size === sz) || {in_stock: false};
      const sel  = _selSize === sz ? 'selected' : '';
      const oos  = !info.in_stock ? 'disabled' : '';
      return `<div class="swatch-size ${sel} ${oos}" data-size="${esc(sz)}">${esc(sz)}</div>`;
    }).join('');
    sizeSection = `
      <div class="vp-group">
        <div class="vp-label">Size <span>${_selSize ? esc(_selSize) : 'Select'}</span></div>
        <div class="swatches" id="size-swatches">${btns}</div>
      </div>`;
  }

  // Add button state
  const curSku  = findSku(data, _selColor, _selSize);
  const needCol = data.has_colors && !_selColor;
  const needSz  = data.has_sizes  && !_selSize;
  const canAdd  = !needCol && !needSz && (!curSku || curSku.in_stock);

  // Stock note
  let stockNote = '';
  if(curSku && curSku.in_stock && typeof curSku.stock === 'number' && curSku.stock < 10){
    stockNote = `<div class="stock-note stock-warn"><i data-lucide="alert-circle" style="width:13px;height:13px"></i> Only ${curSku.stock} left</div>`;
  }

  let btnLabel = 'Add to Cart';
  if(needCol)            btnLabel = 'Select Color';
  else if(needSz)        btnLabel = 'Select Size';
  else if(curSku && !curSku.in_stock) btnLabel = 'Out of Stock';

  prev.style.display = 'block';
  prev.innerHTML = `
    <div class="preview-card">
      ${productHeader}
      ${infoRow}
      ${colorSection}
      ${sizeSection}
      ${stockNote}
      <button class="btn btn-black btn-full" id="add-bag-btn" ${canAdd ? '' : 'disabled'}>
        <i data-lucide="shopping-cart" style="width:15px;height:15px"></i> ${btnLabel}
      </button>
      <button class="btn btn-outline btn-full" id="dismiss-picker-btn" style="margin-top:6px">Cancel</button>
    </div>`;
  lucide.createIcons();
}

// ── Event delegation on #item-preview (survives innerHTML re-renders) ──
$('item-preview').addEventListener('click', (e) => {
  // ── Add to Cart button ──
  const addBtn = e.target.closest('#add-bag-btn');
  if(addBtn && !addBtn.disabled && _lookupData){
    try {
      const sku      = findSku(_lookupData, _selColor, _selSize);
      const skuCode  = sku ? sku.sku_code : (_lookupData.default_sku || '');
      const {price}  = getCurrentPrice();
      addToCart({
        goods_id: _lookupData.goods_id,
        sku_code: skuCode,
        name:     _lookupData.name || `Product #${_lookupData.goods_id}`,
        price,
        image:    _lookupData.image || '',
        color:    _selColor || '',
        size:     _selSize  || '',
        symbol:   _lookupData.symbol || '₱',
      });
      $('item-preview').style.display = 'none';
      _lookupData = null; _selColor = null; _selSize = null;
    } catch(err){ console.error('Add to cart error:', err); toast('Failed to add item', true); }
    return;
  }

  // ── Color swatch ──
  const colorSwatch = e.target.closest('#color-swatches .swatch-color');
  if(colorSwatch && _lookupData){
    _selColor = colorSwatch.dataset.color;
    if(_selSize){
      const valid = getSizesForColor(_lookupData, _selColor).some(s => s.size === _selSize);
      if(!valid) _selSize = null;
    }
    renderPicker();
    return;
  }

  // ── Size swatch ──
  const sizeSwatch = e.target.closest('#size-swatches .swatch-size');
  if(sizeSwatch && !sizeSwatch.classList.contains('disabled')){
    _selSize = sizeSwatch.dataset.size;
    renderPicker();
    return;
  }

  // ── Dismiss / Cancel ──
  const dismissBtn = e.target.closest('#dismiss-picker-btn');
  if(dismissBtn){
    $('item-preview').style.display = 'none';
    _lookupData = null; _selColor = null; _selSize = null;
    return;
  }
});

// ── Checkout ──────────────────────────────────────────────────
$('checkout-btn').addEventListener('click', doCheckout);

async function doCheckout(){
  if(cart.length === 0){ toast('Bag is empty', true); return; }
  const country = $('country-sel').value;
  const btn     = $('checkout-btn');
  btn.disabled  = true;
  btn.innerHTML = `<i data-lucide="loader-2" class="spin" style="width:16px;height:16px"></i> Processing...`;
  lucide.createIcons();

  try{
    const resp = await fetch('/api/checkout', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({items: cart, country})
    });
    const data = await resp.json();
    if(!resp.ok || data.error) throw new Error(data.error || 'Checkout failed');
    renderResults(data);
  } catch(e){
    toast(e.message, true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `Calculate Price <i data-lucide="arrow-right" style="width:16px;height:16px"></i>`;
    lucide.createIcons();
  }
}

// ── Results state (for interactive voucher/points selection) ──
let _resultsData     = null;
let _selectedCoupon  = null;   // null = no voucher, or coupon object
let _usePoints       = false;

function calcFinalTotal(){
  if(!_resultsData) return 0;
  const sym = _resultsData.symbol || '₱';
  let total = _resultsData.grand_total;
  if(_selectedCoupon && _selectedCoupon.eligible && _selectedCoupon.discount > 0)
    total = _selectedCoupon.final_total;
  if(_usePoints && _resultsData.points.has_points)
    total = Math.max(0, total - _resultsData.points.max_discount);
  return Math.max(0, total);
}

function updateLiveTotal(){
  if(!_resultsData) return;
  const sym   = _resultsData.symbol || '₱';
  const total = calcFinalTotal();
  const el    = $('live-total-price');
  if(el) el.textContent = `${sym}${total.toFixed(2)}`;

  const breakdown = $('live-breakdown');
  if(breakdown){
    const rows = [];
    rows.push(`<div class="lt-row"><span>Base price</span><span>${sym}${_resultsData.subtotal.toFixed(2)}</span></div>`);
    const ship = _resultsData.shipping;
    rows.push(`<div class="lt-row"><span>Shipping</span><span class="${ship.free?'val-free':''}">${ship.free?'FREE':`${sym}${ship.cost.toFixed(2)}`}</span></div>`);
    if(_selectedCoupon && _selectedCoupon.eligible && _selectedCoupon.discount > 0)
      rows.push(`<div class="lt-row saving"><span>Voucher (${esc(_selectedCoupon.discount_str)})</span><span>-${sym}${_selectedCoupon.discount.toFixed(2)}</span></div>`);
    if(_usePoints && _resultsData.points.has_points)
      rows.push(`<div class="lt-row saving"><span>SHEIN Points</span><span>-${sym}${_resultsData.points.max_discount.toFixed(2)}</span></div>`);
    breakdown.innerHTML = rows.join('');
  }

  // Update voucher card highlights
  document.querySelectorAll('.coupon-card.selectable').forEach(card => {
    const isActive = _selectedCoupon && card.dataset.couponCode === _selectedCoupon.code;
    card.classList.toggle('active-voucher', isActive);
  });
  const noVoucher = $('no-voucher-opt');
  if(noVoucher) noVoucher.classList.toggle('active-voucher', !_selectedCoupon);
}

function renderResults(data){
  _resultsData    = data;
  _selectedCoupon = data.best_coupon || null;
  _usePoints      = false;
  const sym = data.symbol || '₱';
  const R   = $('results');

  // ── Cleanup notice
  const cleanupNotice = `
    <div class="cleanup-notice">
      <i data-lucide="clock" style="width:14px;height:14px;flex-shrink:0;margin-top:1px"></i>
      <span><b>Auto-cleanup:</b> Cart items added for this check will be automatically deleted after 30 minutes. Each check uses a unique session — your previous cart items are not affected.</span>
    </div>`;

  // ── Items
  const itemsHtml = `
    <section class="section">
      <div class="section-title">
        <span>Order Items</span>
        <button class="btn btn-outline btn-sm" id="back-to-cart-btn">
          <i data-lucide="shopping-cart" style="width:13px;height:13px"></i> Edit
        </button>
      </div>
      ${cleanupNotice}
      <div class="result-items">
        ${data.items.map(i => `
          <div class="ri-row">
            <img class="ri-img" src="${esc(i.image||'')}" onerror="this.style.background='var(--border)';this.src=''" alt="">
            <div class="ri-info">
              <div class="ri-name">${esc(i.name)}</div>
              <div class="ri-attr">${[i.color,i.size].filter(Boolean).map(esc).join(' / ')} &bull; #${esc(i.goods_id)}</div>
            </div>
            <div class="ri-price">${sym}${(i.sale_price*i.qty).toFixed(2)}${i.qty>1?`<span style="color:var(--text-muted);font-size:10px"> ×${i.qty}</span>`:''}</div>
          </div>`).join('')}
      </div>
    </section>`;

  // ── SHEIN Points toggle
  let pointsHtml = '';
  if(data.points && data.points.has_points){
    pointsHtml = `
      <section class="section" style="padding-bottom:14px">
        <div class="section-title-sm">SHEIN Points</div>
        <div class="points-row">
          <div class="points-info">
            <div class="points-name">
              <i data-lucide="coins" style="width:15px;height:15px;color:var(--brand-warn)"></i>
              Apply ${esc(data.points.available.toLocaleString())} points
            </div>
            <div class="points-sub">Save up to ${esc(data.points.max_discount_display)} on this order</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="points-toggle">
            <span class="toggle-track"></span>
          </label>
        </div>
      </section>`;
  }

  // ── Voucher selection
  let voucherHtml = '';
  if(data.coupons && data.coupons.length > 0){
    const cards = data.coupons.map(c => {
      const isBest = data.best_coupon && c.code === data.best_coupon.code;
      const elig   = c.eligible;
      const isActive = _selectedCoupon && c.code === _selectedCoupon.code;

      let priceHtml = '';
      if(c.type === 'free_shipping' && elig){
        priceHtml = `<div class="cc-ship"><i data-lucide="truck" style="width:14px;height:14px"></i> Free shipping with this voucher</div>`;
      } else if(elig && c.discount > 0){
        priceHtml = `
          <div class="cc-price-box">
            <span class="cc-old">${sym}${data.grand_total.toFixed(2)}</span>
            <i data-lucide="arrow-right" style="width:13px;height:13px;color:var(--text-light)"></i>
            <span class="cc-new">${sym}${c.final_total.toFixed(2)}</span>
            <span class="cc-save">-${sym}${c.discount.toFixed(2)}</span>
          </div>`;
      }

      return `
        <div class="coupon-card selectable ${isBest?'best':''} ${elig?'':'ineligible'} ${isActive?'active-voucher':''}"
             data-coupon-code="${esc(c.code||'')}">
          <div class="cc-top">
            <div style="flex:1">
              <div class="cc-name">
                <i data-lucide="ticket" style="width:15px;height:15px"></i>
                ${esc(c.coupon_type)}
                ${isBest ? '<span class="badge badge-green">⭐ Best</span>' : ''}
                ${!elig ? '<span class="badge badge-gray">Not Eligible</span>' : ''}
              </div>
              <div class="cc-desc">${esc(c.discount_str)} &bull; ${esc(c.threshold_str)}</div>
            </div>
            <div class="cc-check"><i data-lucide="check" style="width:12px;height:12px;color:white;stroke-width:3"></i></div>
          </div>
          ${priceHtml}
          <div class="cc-foot">
            ${c.code ? `<div class="cc-code" data-code="${esc(c.code)}">${esc(c.code)}</div>` : '<div></div>'}
            ${!elig && c.min_order > 0
              ? `<div class="cc-inelig"><i data-lucide="alert-circle" style="width:13px;height:13px"></i> Need ${sym}${Math.max(0,c.min_order-data.grand_total).toFixed(2)} more</div>`
              : ''}
          </div>
        </div>`;
    }).join('');

    voucherHtml = `
      <section class="section" style="background:transparent;padding:0 16px 16px">
        <div class="section-title-sm" style="padding:0 0 12px">Select Voucher (${data.coupon_count})</div>
        <div class="no-voucher-opt ${!_selectedCoupon?'active-voucher':''}" id="no-voucher-opt">
          <i data-lucide="x-circle" style="width:15px;height:15px"></i> No Voucher
        </div>
        <div style="height:8px"></div>
        <div class="voucher-selector">${cards}</div>
      </section>`;
  } else {
    voucherHtml = `
      <section class="section">
        <div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px">
          <i data-lucide="ticket-x" style="width:32px;height:32px;stroke-width:1.2;opacity:.4"></i>
          <p style="margin-top:8px">No applicable vouchers for this cart.</p>
        </div>
      </section>`;
  }

  // ── Live total card
  const totalHtml = `
    <section class="section" style="position:sticky;top:60px;z-index:40">
      <div class="lt-label">Estimated Total</div>
      <div class="lt-price" id="live-total-price">${sym}${calcFinalTotal().toFixed(2)}</div>
      <div class="lt-breakdown" id="live-breakdown"></div>
      ${data.shipping.need_more_for_free > 0 ? `
        <div class="ship-note" style="margin-top:10px">
          <i data-lucide="truck" style="width:13px;height:13px"></i>
          Add ${esc(data.shipping.need_more_display)} more for free shipping
        </div>` : ''}
    </section>`;

  R.style.display = 'block';
  R.innerHTML = itemsHtml + totalHtml + pointsHtml + voucherHtml;
  lucide.createIcons();
  updateLiveTotal();

  // ── Event listeners
  $('back-to-cart-btn').addEventListener('click', backToCart);

  if(data.points && data.points.has_points){
    $('points-toggle').addEventListener('change', e => {
      _usePoints = e.target.checked;
      updateLiveTotal();
    });
  }

  // Voucher card click to select
  R.querySelectorAll('.coupon-card.selectable').forEach(card => {
    card.addEventListener('click', e => {
      if(e.target.closest('.cc-code')) return; // don't trigger on code copy
      const code = card.dataset.couponCode;
      if(!code) return;
      const coupon = data.coupons.find(c => c.code === code);
      if(!coupon || !coupon.eligible) return;
      _selectedCoupon = (_selectedCoupon && _selectedCoupon.code === code) ? null : coupon;
      if(!_selectedCoupon && $('no-voucher-opt')) $('no-voucher-opt').classList.add('active-voucher');
      updateLiveTotal();
    });
  });

  const noVoucherBtn = $('no-voucher-opt');
  if(noVoucherBtn){
    noVoucherBtn.addEventListener('click', () => {
      _selectedCoupon = null;
      updateLiveTotal();
    });
  }

  // Code copy
  R.querySelectorAll('.cc-code').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const code = el.dataset.code;
      navigator.clipboard.writeText(code)
        .then(() => toast(`Copied: ${code}`))
        .catch(() => toast(`Code: ${code}`));
    });
  });

  $('sticky-bottom').classList.remove('visible');
  setTimeout(() => R.scrollIntoView({behavior:'smooth', block:'start'}), 50);
}

function backToCart(){
  $('results').style.display = 'none';
  _resultsData = null; _selectedCoupon = null; _usePoints = false;
  if(cart.length > 0) $('sticky-bottom').classList.add('visible');
  $('cart-section').scrollIntoView({behavior:'smooth', block:'start'});
}

// ── Init ──────────────────────────────────────────────────────
renderCart();
</script>
</body>
</html>
